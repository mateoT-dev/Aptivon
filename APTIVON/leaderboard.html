<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard | Aptivon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="leaderboard" class="app-body">
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  <div class="app-layout">
    <aside class="sidebar glass" id="sidebar">
      <div class="sidebar-top">
        <a class="brand" href="dashboard.html">
          <span class="brand-mark">A</span>
          <span>Aptivon</span>
        </a>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">&#9776;</button>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="dashboard.html">Dashboard</a>
        <a class="nav-item" href="quiz.html">Quiz Arena</a>
        <a class="nav-item active" href="leaderboard.html">Leaderboard</a>
        <a class="nav-item" href="qa.html">Q&amp;A Hub</a>
        <a class="nav-item" href="profile.html">Profile</a>
      </nav>
      <button id="logoutButton" class="button button-secondary full-width">Logout</button>
    </aside>

    <main class="app-main">
      <header class="dashboard-header">
        <div>
          <p class="eyebrow">Leaderboard</p>
          <h1>The fastest minds, ranked live.</h1>
        </div>
        <div class="glass leaderboard-badge">
          <span>Your current position</span>
          <strong id="leaderboardCurrentRank">#--</strong>
        </div>
      </header>

      <section class="leaderboard-top3" id="leaderboardTop3"></section>
      <section class="panel glass">
        <div class="panel-head">
          <div>
            <span class="eyebrow">Global ranking</span>
            <h2>All learners</h2>
          </div>
        </div>
        <div id="leaderboardList" class="leaderboard-list"></div>
      </section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
