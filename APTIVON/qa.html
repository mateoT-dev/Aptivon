<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q&amp;A Hub | Aptivon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="qa" class="app-body">
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  <div class="app-layout">
    <aside class="sidebar glass" id="sidebar">
      <div class="sidebar-top">
        <a class="brand" href="dashboard.html">
          <span class="brand-mark">A</span>
          <span>Aptivon</span>
        </a>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">&#9776;</button>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="dashboard.html">Dashboard</a>
        <a class="nav-item" href="quiz.html">Quiz Arena</a>
        <a class="nav-item" href="leaderboard.html">Leaderboard</a>
        <a class="nav-item active" href="qa.html">Q&amp;A Hub</a>
        <a class="nav-item" href="profile.html">Profile</a>
      </nav>
      <button id="logoutButton" class="button button-secondary full-width">Logout</button>
    </aside>

    <main class="app-main">
      <header class="dashboard-header">
        <div>
          <p class="eyebrow">Q&amp;A community</p>
          <h1>Ask smarter questions. Share sharper answers.</h1>
        </div>
        <button id="toggleQuestionForm" class="button button-primary glow">Ask Question</button>
      </header>

      <section class="panel glass question-form-panel hidden" id="questionFormPanel">
        <div class="panel-head">
          <div>
            <span class="eyebrow">New discussion</span>
            <h2>Start a question thread</h2>
          </div>
        </div>
        <form id="questionForm" class="auth-form">
          <label>
            <span>Title</span>
            <input id="questionTitle" type="text" maxlength="100" placeholder="What do you need help with?" required>
          </label>
          <label>
            <span>Details</span>
            <textarea id="questionContent" rows="4" placeholder="Add context so others can help quickly." required></textarea>
          </label>
          <button class="button button-primary glow" type="submit">Post Question</button>
        </form>
      </section>

      <section id="questionsList" class="questions-list"></section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
